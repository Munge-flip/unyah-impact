<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Information - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <a href="user-profile.html" class="p-2 bg-gray-50 rounded-xl text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="text-xl font-bold text-gray-800">Edit Profile</h1>
    </header>

    <main class="p-6">
        <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-gray-100">
            <form class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Full Name</label>
                    <input type="text" value="John Doe" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" value="john.doe@example.com" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Phone Number</label>
                    <input type="tel" value="+63 912 345 6789" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>

                <div class="pt-4">
                    <button type="button" class="w-full py-4 bg-purple-600 text-white font-bold rounded-2xl shadow-lg shadow-purple-100 active:scale-95 transition-transform uppercase text-sm">
                        Save Changes
                    </button>
                    <a href="user-change-password.html" class="block w-full mt-4 py-4 text-center text-purple-600 font-bold border-2 border-purple-50 rounded-2xl active:bg-purple-50 transition-colors text-sm uppercase">
                        Change Password
                    </a>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
