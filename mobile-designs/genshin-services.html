<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Impact Services - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }
        .service-btn-active { border-color: #a78bfa !important; background: #f5f3ff !important; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-40">

    <!-- Top Banner & Back Button -->
    <div class="relative h-48 w-full">
        <img src="../public/img/genshin banner.png" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/30"></div>
        <a href="index.html" class="absolute top-4 left-4 p-2 bg-white/20 backdrop-blur-md rounded-full text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
    </div>

    <!-- Game Info Card -->
    <div class="px-6 -mt-10 relative z-10">
        <div class="bg-white rounded-3xl p-4 shadow-xl flex items-center gap-4 border border-purple-50">
            <img src="../public/img/paimon logo.png" class="w-16 h-16 rounded-full border-4 border-white shadow-lg">
            <div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">Genshin Impact</h1>
                <p class="text-[10px] font-black uppercase text-purple-400 tracking-widest">Service Piloting</p>
            </div>
        </div>
    </div>

    <main class="p-6 space-y-10">
        
        <!-- Maintenance -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Maintenance</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Daily</span>
                    <span class="font-black text-purple-600">₱57</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Weekly</span>
                    <span class="font-black text-purple-600">₱300</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Monthly</span>
                    <span class="font-black text-purple-600">₱1300</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full Patch (6 weeks)</span>
                    <span class="font-black text-purple-600">₱700</span>
                </button>
            </div>
        </section>

        <!-- Regular Quests -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Regular Quests</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Short quests (1-2 parts)</span>
                    <span class="font-black text-purple-600">₱50</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Long quests (multiple parts)</span>
                    <span class="font-black text-purple-600">₱170</span>
                </button>
            </div>
        </section>

        <!-- Events -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Events</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Light events</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full event</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Light events (Half)</span>
                    <span class="font-black text-purple-600">₱100</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full event (Half)</span>
                    <span class="font-black text-purple-600">₱200</span>
                </button>
            </div>
        </section>

        <!-- Endgame -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Endgame</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Spiral abyss</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Imaginarium Theater</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Stygian Onslaught</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
            </div>
        </section>

        <!-- Region Grid -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Explorations</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/mondstadt banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Mondstadt</p>
                </div>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/liyue banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Liyue</p>
                </div>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/inazuma banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Inazuma</p>
                </div>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/fontaine banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Fontaine</p>
                </div>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/sumeru banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Sumeru</p>
                </div>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/natlan banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Natlan</p>
                </div>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-transparent active:border-purple-400 transition-all">
                    <img src="../public/img/nod-krai banner.png" class="h-20 w-full object-cover">
                    <p class="p-3 text-center text-xs font-black uppercase text-gray-700 tracking-tighter">Nod Krai</p>
                </div>
            </div>
        </section>

        <!-- Chest Farming -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Chest Farming</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Light farming 30 chests</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full chest run</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
            </div>
        </section>

        <!-- Collecting oculi -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Collecting oculi</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">1 Region</span>
                    <span class="font-black text-purple-600">₱170</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full map</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
            </div>
        </section>

        <!-- Unlocking Waypoints & Statues -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">Unlocking Waypoints & Statues</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Small Area</span>
                    <span class="font-black text-purple-600">₱70</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full Region</span>
                    <span class="font-black text-purple-600">₱70</span>
                </button>
            </div>
        </section>

        <!-- 100% Area Completion -->
        <section>
            <h2 class="text-lg font-bold text-gray-700 mb-4 border-b-2 border-purple-200 pb-1">100% Area Completion</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Small area</span>
                    <span class="font-black text-purple-600">₱170</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Whole region</span>
                    <span class="font-black text-purple-600">₱120</span>
                </button>
            </div>
        </section>

        <!-- Payment Method -->
        <section class="space-y-8">
            <h2 class="text-xl font-black text-gray-800 mb-4 border-b-2 border-orange-400 pb-2 uppercase tracking-tighter">Payment Method</h2>
            
            <div class="space-y-2">
                <span class="bg-orange-400 text-white text-[10px] font-black px-4 py-1 rounded-t-xl uppercase tracking-widest ml-1">QR Payment</span>
                <div class="grid grid-cols-2 gap-3 bg-white p-4 rounded-b-2xl rounded-tr-2xl border-2 border-orange-50 shadow-md">
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-orange-400 active:bg-orange-50 transition-all">
                        <span class="font-bold text-gray-800">GCash</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Scan QR</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-orange-400 active:bg-orange-50 transition-all">
                        <span class="font-bold text-gray-800">PayPal</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Scan QR</span>
                    </button>
                </div>
            </div>

            <div class="space-y-2">
                <span class="bg-indigo-500 text-white text-[10px] font-black px-4 py-1 rounded-t-xl uppercase tracking-widest ml-1">E-Wallet</span>
                <div class="grid grid-cols-2 gap-3 bg-white p-4 rounded-b-2xl rounded-tr-2xl border-2 border-indigo-50 shadow-md">
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-indigo-400 active:bg-indigo-50 transition-all">
                        <span class="font-bold text-gray-800">GCash</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Direct</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-indigo-400 active:bg-indigo-50 transition-all">
                        <span class="font-bold text-gray-800">PayPal</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Direct</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Sticky Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-gray-100 p-6 rounded-t-[3rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] z-50">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] uppercase font-black text-gray-400 tracking-widest mb-1">Total Order</p>
                <p class="text-3xl font-black text-gray-800 leading-none">₱0.00</p>
            </div>
            <button class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-4 px-10 rounded-2xl shadow-xl shadow-purple-100 active:scale-95 transition-all uppercase text-sm tracking-tight">
                Place Order
            </button>
        </div>
    </div>

</body>
</html>
