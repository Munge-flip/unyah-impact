<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoyo Piloting - Mobile Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#14171D] min-h-screen text-white flex flex-col p-6 justify-center">

    <div class="mb-10 text-center">
        <div class="w-20 h-20 bg-[#A38141] rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg">
            <img src="../public/img/weblogo.png" alt="Logo" class="w-14 h-14 object-contain">
        </div>
        <h1 class="text-3xl font-black text-[#A38141] tracking-tight">SIGN IN</h1>
        <p class="text-white/50 mt-2">Welcome back, Traveler.</p>
    </div>

    <form class="space-y-4">
        <div class="space-y-1">
            <label class="text-xs font-bold text-[#A38141] uppercase tracking-widest ml-4">Email Address</label>
            <input type="email" placeholder="example@email.com" class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-4 outline-none focus:border-[#A38141] focus:ring-1 focus:ring-[#A38141] transition-all">
        </div>

        <div class="space-y-1">
            <label class="text-xs font-bold text-[#A38141] uppercase tracking-widest ml-4">Password</label>
            <input type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-4 outline-none focus:border-[#A38141] focus:ring-1 focus:ring-[#A38141] transition-all">
        </div>

        <div class="flex justify-end pr-4">
            <a href="#" class="text-sm text-white/40 hover:text-white transition">Forgot Password?</a>
        </div>

        <button type="button" class="w-full bg-[#A38141] hover:bg-[#c29c54] text-white font-bold py-4 rounded-full shadow-xl shadow-[#A38141]/20 transition-all active:scale-95 mt-4">
            LOGIN
        </button>
    </form>

    <div class="mt-10 text-center">
        <p class="text-white/40 text-sm">
            Don't have an account? 
            <a href="register.html" class="text-[#A38141] font-bold hover:underline ml-1">Create Account</a>
        </p>
    </div>

</body>
</html>
