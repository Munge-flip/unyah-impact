<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Orders - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-24">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <h1 class="text-xl font-bold text-gray-800">Track Orders</h1>
        <button class="p-2 bg-gray-100 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
    </header>

    <main class="p-4 space-y-4">
        
        <!-- Filter Tabs -->
        <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
            <button class="px-6 py-2 bg-purple-600 text-white text-xs font-bold rounded-full whitespace-nowrap shadow-lg shadow-purple-100">All Orders</button>
            <button class="px-6 py-2 bg-white text-gray-500 text-xs font-bold rounded-full border border-gray-100 whitespace-nowrap">Pending</button>
            <button class="px-6 py-2 bg-white text-gray-500 text-xs font-bold rounded-full border border-gray-100 whitespace-nowrap">In Progress</button>
            <button class="px-6 py-2 bg-white text-gray-500 text-xs font-bold rounded-full border border-gray-100 whitespace-nowrap">Completed</button>
        </div>

        <!-- Order Card 1 -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-black text-gray-800 uppercase tracking-tighter">Order #HP-2026-001</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">April 20, 2026</p>
                </div>
                <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest rounded-full">In Progress</span>
            </div>
            
            <div class="space-y-2 mb-6">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Service:</span>
                    <span class="text-gray-800 font-bold">Spiral Abyss Clear</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Game:</span>
                    <span class="text-gray-800 font-bold">Genshin Impact</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Total:</span>
                    <span class="text-purple-600 font-black">₱120.00</span>
                </div>
            </div>

            <a href="user-order-details.html" class="block w-full py-3 text-center bg-gray-50 text-purple-600 font-bold rounded-xl active:bg-purple-50 transition-colors">
                View Details
            </a>
        </div>

        <!-- Order Card 2 -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-black text-gray-800 uppercase tracking-tighter">Order #HP-2026-002</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">April 19, 2026</p>
                </div>
                <span class="px-3 py-1 bg-yellow-50 text-yellow-600 text-[10px] font-black uppercase tracking-widest rounded-full">Pending</span>
            </div>
            
            <div class="space-y-2 mb-6">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Service:</span>
                    <span class="text-gray-800 font-bold">Daily Commissions</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Game:</span>
                    <span class="text-gray-800 font-bold">HSR</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Total:</span>
                    <span class="text-purple-600 font-black">₱57.00</span>
                </div>
            </div>

            <a href="#" class="block w-full py-3 text-center bg-gray-50 text-purple-600 font-bold rounded-xl active:bg-purple-50 transition-colors">
                View Details
            </a>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
        </a>
        <a href="user-orders.html" class="flex flex-col items-center gap-1 text-purple-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Orders</span>
        </a>
        <a href="user-profile.html" class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Profile</span>
        </a>
    </nav>

</body>
</html>
