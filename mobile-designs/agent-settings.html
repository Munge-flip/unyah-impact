<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Settings - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f0f9f9] min-h-screen pb-28">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-sm">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="agent-dashboard.html" class="p-2 bg-white/10 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <h1 class="text-lg font-bold tracking-tight truncate">Agent Profile</h1>
    </header>

    <main class="p-4 space-y-6">
        
        <!-- Agent Profile Summary -->
        <section class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50 flex items-center gap-4">
            <div class="w-16 h-16 rounded-2xl border-2 border-emerald-400 overflow-hidden shadow-lg">
                <img src="../public/img/yours.png" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-gray-800 text-lg leading-none">Agent Silver</h2>
                <p class="text-xs text-gray-400 mt-1">silver.pilot@example.com</p>
            </div>
            <button class="p-2 bg-[#f0f9f9] text-emerald-600 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
            </button>
        </section>

        <!-- Availability Toggle -->
        <section class="space-y-3">
            <h2 class="text-xs font-black text-emerald-800 uppercase tracking-widest mb-3 ml-1 italic">Availability</h2>
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-emerald-50">
                <div class="p-5 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-700">Online Status</p>
                        <p class="text-[10px] text-gray-400">Receive new task assignments</p>
                    </div>
                    <div class="w-12 h-6 bg-emerald-500 rounded-full relative">
                        <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Performance Stats -->
        <section class="space-y-3">
            <h2 class="text-xs font-black text-emerald-800 uppercase tracking-widest mb-3 ml-1 italic">Performance Tracking</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-emerald-50 text-center">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Avg. Rating</p>
                    <p class="text-xl font-black text-emerald-600">4.9/5.0</p>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-emerald-50 text-center">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Earned</p>
                    <p class="text-xl font-black text-gray-800">₱12.4k</p>
                </div>
            </div>
        </section>

        <!-- Danger Zone -->
        <section class="pt-4">
            <button class="w-full flex items-center justify-center gap-3 py-5 bg-white text-red-500 font-black rounded-3xl shadow-sm border-2 border-red-50 active:bg-red-50 transition-all uppercase text-sm tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout Agent
            </button>
        </section>
    </main>

    <!-- Agent Bottom Nav (Settings Active) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#1e1e1e]/95 backdrop-blur-lg border-t border-white/10 p-4 flex justify-between items-center z-50 text-white/40">
        <a href="agent-dashboard.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-bold uppercase">Stats</span>
        </a>
        <a href="agent-tasks.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="text-[8px] font-bold uppercase">Tasks</span>
        </a>
        <a href="agent-settings.html" class="flex flex-col items-center gap-1 shrink-0 text-emerald-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            <span class="text-[8px] font-bold uppercase">Settings</span>
        </a>
    </nav>
</body>
</html>
