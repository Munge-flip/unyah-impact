<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service - Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-10">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-sm">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="admin-services-genshin.html" class="p-2 bg-white/10 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <h1 class="text-lg font-bold tracking-tight truncate">Edit Service</h1>
    </header>

    <main class="p-6 space-y-6">
        <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
            <form class="space-y-6">
                <!-- Status Toggle -->
                <div class="flex justify-between items-center p-4 bg-green-50 rounded-2xl border border-green-100">
                    <div>
                        <p class="text-[10px] font-black text-green-600 uppercase tracking-widest leading-none">Service Status</p>
                        <p class="font-bold text-green-800 text-sm mt-1">Currently Active</p>
                    </div>
                    <div class="w-12 h-6 bg-green-500 rounded-full relative">
                        <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>

                <!-- Name (Pre-filled) -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Service Name</label>
                    <input type="text" value="Daily Commissions" class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 outline-none">
                </div>

                <!-- Price (Pre-filled) -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Price (₱)</label>
                    <div class="relative">
                        <span class="absolute left-5 top-4 text-slate-400 font-bold">₱</span>
                        <input type="number" value="57.00" class="w-full bg-slate-50 border-none rounded-2xl pl-10 pr-5 py-4 text-sm font-bold text-gray-700 outline-none">
                    </div>
                </div>

                <div class="pt-4 space-y-3">
                    <button type="button" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-100 active:scale-95 transition-transform uppercase text-sm tracking-widest">
                        Update Details
                    </button>
                    <button type="button" class="w-full py-4 bg-white text-red-500 font-bold rounded-2xl border-2 border-red-50 active:bg-red-50 transition-all uppercase text-sm tracking-widest flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        Delete Service
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
