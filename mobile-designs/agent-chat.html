<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] h-screen flex flex-col">

    <!-- Header (Changed to White) -->
    <header class="p-4 flex items-center justify-between bg-white border-b border-gray-100 shadow-sm z-50">
        <div class="flex items-center gap-3">
            <a href="agent-task-details.html" class="text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <div class="flex items-center gap-2">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 font-bold shadow-sm">U</div>
                    <!-- User Online Status -->
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-gray-800 leading-none">User@4421</h1>
                    <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest mt-1">Online</p>
                </div>
            </div>
        </div>
        <button class="text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
            </svg>
        </button>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
        <!-- User Message -->
        <div class="flex items-end gap-2 max-w-[85%]">
            <div class="flex-1 bg-white p-4 rounded-2xl rounded-bl-none shadow-sm border border-gray-100">
                <p class="text-sm text-gray-800">Hello! I just placed an order for 100% exploration. Are you starting soon?</p>
                <span class="text-[9px] text-gray-400 mt-2 block text-right">02:15 PM</span>
            </div>
        </div>

        <!-- Agent Message (Matches User Chat Purple) -->
        <div class="flex items-end gap-2 max-w-[85%] ml-auto">
            <div class="flex-1 bg-purple-600 p-4 rounded-2xl rounded-br-none shadow-lg shadow-purple-100 text-white">
                <p class="text-sm font-medium">Hello Traveler! Yes, I'm currently logging in. Please stay offline for the next 2 hours.</p>
                <span class="text-[9px] text-purple-200 mt-2 block text-right">02:16 PM</span>
            </div>
        </div>
    </main>

    <!-- Input Bar -->
    <footer class="p-4 bg-white border-t border-gray-100 flex items-center gap-3 pb-8">
        <button class="p-2 text-gray-400 hover:text-purple-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
        </button>
        <div class="flex-1 relative">
            <input type="text" placeholder="Type instructions..." class="w-full bg-gray-100 border-none rounded-2xl px-4 py-3 text-sm text-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all">
        </div>
        <button class="p-3 bg-purple-600 text-white rounded-2xl shadow-lg shadow-purple-200 active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
        </button>
    </footer>

</body>
</html>
