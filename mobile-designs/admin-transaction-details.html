<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Review - Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-10">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-sm">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="admin-transactions.html" class="p-2 bg-white/10 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <div class="truncate">
            <h1 class="text-lg font-bold tracking-tight leading-none truncate">Review Payment</h1>
            <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest mt-1">ID: #TRX-9821-HP</p>
        </div>
    </header>

    <main class="p-6 space-y-6">
        <!-- Transaction Summary -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Amount Received</p>
            <h2 class="text-4xl font-black text-slate-800">₱120.00</h2>
        </div>

        <!-- Detailed Payment Information -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-1 italic">Payment Information</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center pb-3 border-b border-slate-50">
                    <span class="text-xs text-slate-400 font-bold uppercase">Transaction #</span>
                    <span class="text-sm font-black text-slate-700 uppercase">HP-TX-2026-9821</span>
                </div>
                <div class="flex justify-between items-center pb-3 border-b border-slate-50">
                    <span class="text-xs text-slate-400 font-bold uppercase">Sender Name</span>
                    <span class="text-sm font-bold text-slate-700">John Doe</span>
                </div>
                <div class="flex justify-between items-center pb-3 border-b border-slate-50">
                    <span class="text-xs text-slate-400 font-bold uppercase">Method</span>
                    <div class="text-right">
                        <span class="text-sm font-bold text-slate-700">GCash</span>
                        <p class="text-[9px] text-slate-300 font-bold uppercase mt-1">E-Wallet Transfer</p>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs text-slate-400 font-bold uppercase">Submitted On</span>
                    <span class="text-sm font-bold text-slate-700">Apr 21, 2026 • 02:45 PM</span>
                </div>
            </div>
        </div>

        <!-- Proof Image -->
        <div class="space-y-3">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 italic">Payment Proof</h3>
            <div class="bg-white rounded-3xl p-2 shadow-sm border border-slate-100 overflow-hidden aspect-[3/4]">
                <div class="w-full h-full bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300">
                    <div class="text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="text-[10px] font-black uppercase tracking-tighter">Tap to Expand Proof</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-4">
            <button class="flex-1 py-4 bg-red-50 text-red-500 font-bold rounded-2xl active:bg-red-100 transition-colors uppercase text-xs">
                Reject
            </button>
            <button class="flex-[2] py-4 bg-green-600 text-white font-bold rounded-2xl shadow-lg shadow-green-100 active:scale-95 transition-transform uppercase text-xs">
                Verify Payment
            </button>
        </div>
    </main>

</body>
</html>
