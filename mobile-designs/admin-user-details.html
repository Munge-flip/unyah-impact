<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-10">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-sm">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="admin-users.html" class="p-2 bg-white/10 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <h1 class="text-lg font-bold tracking-tight truncate">User: John Doe</h1>
    </header>

    <main class="p-6 space-y-6">
        <!-- Profile Card -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 flex flex-col items-center text-center">
            <div class="w-24 h-24 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-3xl font-black mb-4 border-4 border-white shadow-lg">JD</div>
            <h2 class="text-xl font-bold text-slate-800">John Doe</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Traveler • ID: #4421</p>
        </div>

        <!-- Information -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Email Address</label>
                <p class="text-sm font-bold text-slate-700">john.doe@example.com</p>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Phone Number</label>
                <p class="text-sm font-bold text-slate-700">+63 912 345 6789</p>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Registration Date</label>
                <p class="text-sm font-bold text-slate-700">January 15, 2026</p>
            </div>
        </div>

        <!-- Recent Orders -->
        <div class="space-y-3">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 italic">Order History</h3>
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 divide-y divide-slate-50">
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-800 text-xs">#HP-992 • Genshin</p>
                        <p class="text-[9px] text-blue-500 font-bold uppercase">In Progress</p>
                    </div>
                    <span class="font-black text-slate-800 text-xs">₱120.00</span>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-800 text-xs">#HP-842 • HSR</p>
                        <p class="text-[9px] text-green-500 font-bold uppercase">Completed</p>
                    </div>
                    <span class="font-black text-slate-800 text-xs">₱300.00</span>
                </div>
            </div>
        </div>

        <!-- Danger Zone -->
        <button class="w-full py-4 bg-red-50 text-red-500 font-black rounded-2xl active:bg-red-100 transition-colors uppercase text-xs tracking-widest">
            Disable Account
        </button>
    </main>

</body>
</html>
