<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }

<body class="bg-[#f1f5f9] min-h-screen pb-28">

    <!-- Header -->

        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="admin-dashboard.html" class="p-2 bg-white/10 rounded-xl">

                </svg>
            </a>
        </div>
        <h1 class="text-lg font-bold tracking-tight truncate">User Management</h1>
    </header>

    <main class="p-4 space-y-4">
        <!-- User Card 1 -->
        <a href="admin-user-details.html" class="block bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center gap-4 active:bg-slate-50 transition-colors">
            <div class="w-12 h-12 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center font-black">JD</div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-slate-800 truncate">John Doe</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase truncate">john.doe@example.com</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-black text-slate-800">12 Orders</p>
                <span class="text-[10px] font-bold text-blue-600 uppercase">View</span>
            </div>
        </a>

        <!-- User Card 2 -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-slate-100 text-slate-400 flex items-center justify-center font-black">AS</div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-slate-800 truncate">Alice Smith</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase truncate">alice@starmail.com</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-black text-slate-800">2 Orders</p>
                <span class="text-[10px] font-bold text-blue-600 uppercase">View</span>
            </div>
        </div>
    </main>

        </a>
