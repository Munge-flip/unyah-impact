<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-24">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <h1 class="text-xl font-bold text-gray-800">My Profile</h1>
        <button class="p-2 text-gray-400 hover:text-purple-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </header>

    <main class="p-6">
        <!-- User Info Card -->
        <div class="bg-gradient-to-br from-purple-600 to-indigo-700 rounded-[2rem] p-6 shadow-xl shadow-purple-200 text-white mb-8">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-20 h-20 rounded-full border-4 border-white/30 overflow-hidden shadow-lg">
                    <img src="../public/img/yours.png" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="text-2xl font-bold">John Doe</h2>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Traveler</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 rounded-2xl p-4">
                    <p class="text-[10px] text-white/60 uppercase font-bold tracking-wider mb-1">Total Orders</p>
                    <p class="text-xl font-black">12</p>
                </div>
                <div class="bg-white/10 rounded-2xl p-4">
                    <p class="text-[10px] text-white/60 uppercase font-bold tracking-wider mb-1">Completed</p>
                    <p class="text-xl font-black">10</p>
                </div>
            </div>
        </div>

        <!-- Account Details -->
        <div class="space-y-4">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Account Details</h3>
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Email Address</label>
                    <p class="text-gray-700 font-bold">john.doe@example.com</p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Phone Number</label>
                    <p class="text-gray-700 font-bold">+63 912 345 6789</p>
                </div>
            </div>
            
            <button class="w-full py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl active:bg-gray-200 transition-colors">
                Edit Information
            </button>
        </div>

        <!-- Danger Zone -->
        <div class="mt-12">
            <button class="w-full flex items-center justify-center gap-2 py-4 text-red-500 font-bold bg-red-50 rounded-2xl active:bg-red-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Sign Out
            </button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
        </a>
        <a href="user-orders.html" class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h12l1 12H4L5 9z" /></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Orders</span>
        </a>
        <a href="user-profile.html" class="flex flex-col items-center gap-1 text-purple-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Profile</span>
        </a>
    </nav>

</body>
</html>
