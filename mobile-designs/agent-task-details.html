<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - Agent Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f0f9f9] min-h-screen pb-28">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-lg">
        <a href="agent-tasks.html" class="p-2 bg-white/10 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="text-lg font-bold tracking-tight">Task Details</h1>
    </header>

    <main class="p-6 space-y-6">
        
        <!-- Status & Chat Section (Chat Client preserved as task action) -->
        <div class="flex gap-3">
            <div class="flex-1 bg-white rounded-3xl p-4 shadow-sm border border-emerald-50 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Status</p>
                <span class="text-emerald-600 font-black text-sm italic uppercase">In Progress</span>
            </div>
            <a href="agent-chat.html" class="flex-1 bg-emerald-600 rounded-3xl p-4 shadow-lg shadow-emerald-100 flex flex-col items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <span class="text-[10px] font-black uppercase tracking-widest leading-none">Chat Client</span>
            </a>
        </div>

        <!-- Order Info -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Order Information</h3>
            <div class="space-y-4">
                <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Game:</span>
                    <span class="text-gray-800 font-bold">Genshin Impact</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Service:</span>
                    <span class="text-gray-800 font-bold">100% Map Completion</span>
                </div>
                <div class="flex justify-between items-start">
                    <span class="text-gray-500 text-sm">Regions:</span>
                    <div class="text-right flex flex-wrap gap-1 justify-end max-w-[150px]">
                        <span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-[9px] font-black rounded uppercase">Mondstadt</span>
                        <span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-[9px] font-black rounded uppercase">Liyue</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Management Controls -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-emerald-50">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Progress Control</h3>
            
            <div class="space-y-4">
                <button class="w-full py-4 bg-emerald-50 text-emerald-700 font-black rounded-2xl border-2 border-emerald-100 uppercase text-xs tracking-widest active:bg-emerald-100 transition-colors">
                    Start Working
                </button>
                <button class="w-full py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-lg shadow-emerald-100 uppercase text-xs tracking-widest active:scale-95 transition-transform">
                    Mark as Completed
                </button>
            </div>
        </div>
    </main>

    <!-- Agent Bottom Nav (Scrollable 3-Item) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#1e1e1e]/95 backdrop-blur-lg border-t border-white/10 p-4 flex justify-between items-center z-50 text-white/40">
        <a href="agent-dashboard.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-bold uppercase">Stats</span>
        </a>
        <a href="agent-tasks.html" class="flex flex-col items-center gap-1 shrink-0 text-emerald-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="text-[8px] font-bold uppercase">Tasks</span>
        </a>
        <a href="agent-settings.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            <span class="text-[8px] font-bold uppercase">Settings</span>
        </a>
    </nav>
</body>
</html>
