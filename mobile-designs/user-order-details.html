<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-6">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <a href="user-orders.html" class="p-2 bg-gray-50 rounded-xl text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="text-xl font-bold text-gray-800">Order Details</h1>
    </header>

    <main class="p-6">
        
        <!-- Status Banner -->
        <div class="bg-blue-600 rounded-[2rem] p-6 text-white mb-8 shadow-xl shadow-blue-100 flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">Current Status</p>
                <h2 class="text-2xl font-black italic uppercase">In Progress</h2>
            </div>
            <div class="bg-white/20 p-3 rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
        </div>

        <!-- Service Info -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mb-6 space-y-6">
            <div>
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">Service Information</h3>
                <div class="space-y-4">
                    <div class="flex justify-between">
                        <span class="text-gray-500 text-sm">Game:</span>
                        <span class="text-gray-800 font-bold">Genshin Impact</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500 text-sm">Category:</span>
                        <span class="text-gray-800 font-bold">Endgame</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500 text-sm">Service:</span>
                        <span class="text-gray-800 font-bold">Spiral Abyss Clear</span>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-50">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">Regions Selected</h3>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 bg-purple-50 text-purple-600 text-[10px] font-bold rounded-full uppercase">Mondstadt</span>
                    <span class="px-3 py-1 bg-purple-50 text-purple-600 text-[10px] font-bold rounded-full uppercase">Liyue</span>
                </div>
            </div>
        </div>

        <!-- Payment Info & QR -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mb-6">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Payment & Receipt</h3>
            
            <div class="text-center p-4 bg-gray-50 rounded-2xl mb-6">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Scan to Pay (GCash)</p>
                <!-- Placeholder for QR Code -->
                <div class="w-40 h-40 bg-white mx-auto border-4 border-gray-100 rounded-xl flex items-center justify-center mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                </div>
                <p class="text-xl font-black text-gray-800">₱120.00</p>
            </div>

            <button class="w-full py-4 bg-purple-600 text-white font-bold rounded-2xl shadow-lg shadow-purple-100 active:scale-95 transition-transform uppercase text-sm">
                Upload Proof of Payment
            </button>
        </div>

        <!-- Chat Link -->
        <button class="w-full flex items-center justify-between p-6 bg-white rounded-3xl shadow-sm border border-gray-100 active:bg-gray-50 transition-colors">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <div class="text-left">
                    <p class="font-bold text-gray-800">Chat with Agent</p>
                    <p class="text-xs text-gray-400">Discuss your order details</p>
                </div>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>

    </main>

</body>
</html>
