<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Agent Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f0f9f9] min-h-screen pb-28">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-lg">
        <a href="agent-dashboard.html" class="p-2 bg-white/10 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="text-lg font-bold tracking-tight">Active Tasks</h1>
    </header>

    <main class="p-4 space-y-4">
        
        <!-- Filter Tabs -->
        <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
            <button class="px-6 py-2 bg-emerald-600 text-white text-xs font-bold rounded-full whitespace-nowrap shadow-lg shadow-emerald-100">Ongoing</button>
            <button class="px-6 py-2 bg-white text-teal-500 text-xs font-bold rounded-full border border-emerald-100 whitespace-nowrap">Completed</button>
        </div>

        <!-- Task Card 1 -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-50">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-black text-gray-800 uppercase tracking-tighter">Order #HP-992</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest italic">Genshin Impact</p>
                </div>
                <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest rounded-full">In Progress</span>
            </div>
            
            <div class="space-y-2 mb-6 text-sm">
                <div class="flex justify-between items-center">
                    <span class="text-gray-400">Game:</span>
                    <span class="text-gray-800 font-bold">Genshin Impact</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-400">Task:</span>
                    <span class="text-gray-800 font-bold">100% Map Completion</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-400">Customer:</span>
                    <span class="text-emerald-600 font-bold italic">User@4421</span>
                </div>
            </div>

            <a href="agent-task-details.html" class="block w-full py-4 text-center bg-[#f0f9f9] text-emerald-600 font-black rounded-2xl active:bg-emerald-50 transition-colors uppercase text-xs tracking-widest">
                Manage Progress
            </a>
        </div>
    </main>

    <!-- Agent Bottom Nav (Scrollable 3-Item) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#1e1e1e]/95 backdrop-blur-lg border-t border-white/10 p-4 flex justify-between items-center z-50 text-white/40">
        <a href="agent-dashboard.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-bold uppercase">Stats</span>
        </a>
        <a href="agent-tasks.html" class="flex flex-col items-center gap-1 shrink-0 text-emerald-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="text-[8px] font-bold uppercase">Tasks</span>
        </a>
        <a href="agent-settings.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            <span class="text-[8px] font-bold uppercase">Settings</span>
        </a>
    </nav>
</body>
</html>
