<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Agents - Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-28">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-sm">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="admin-dashboard.html" class="p-2 bg-white/10 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <h1 class="text-lg font-bold tracking-tight truncate">Piloting Agents</h1>
        <div class="ml-auto flex items-center gap-2">
            <button class="p-2 bg-blue-500 rounded-xl text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            </button>
        </div>
    </header>

    <main class="p-4 space-y-4">
        
        <!-- Search -->
        <div class="relative">
            <input type="text" placeholder="Search agents by name..." class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-5 top-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>

        <!-- Agent Card -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-14 h-14 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black text-xl shadow-md">AS</div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800">Agent_Silver</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Joined Jan 2026</p>
                </div>
                <div class="text-right">
                    <span class="px-2 py-1 bg-green-50 text-green-600 text-[10px] font-black uppercase rounded-lg">Online</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="p-3 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Assigned</p>
                    <p class="font-black text-slate-700">08</p>
                </div>
                <div class="p-3 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Completed</p>
                    <p class="font-black text-slate-700">142</p>
                </div>
            </div>

            <div class="flex gap-2">
                <button class="flex-1 py-3 border-2 border-slate-100 text-slate-600 text-xs font-bold rounded-xl active:bg-slate-50 transition-colors">
                    VIEW PERFORMANCE
                </button>
                <button class="px-4 py-3 bg-red-50 text-red-500 rounded-xl active:bg-red-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Admin Nav (Scrollable 7-Item) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#1e1e1e]/95 backdrop-blur-lg border-t border-white/10 p-4 flex overflow-x-auto whitespace-nowrap hide-scrollbar gap-8 items-center z-50 text-white/40">
        <a href="admin-dashboard.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span class="text-[8px] font-bold uppercase">Stats</span>
        </a>
        <a href="admin-orders.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="text-[8px] font-bold uppercase">Orders</span>
        </a>
        <a href="admin-services-genshin.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745V20a2 2 0 002 2h14a2 2 0 002-2v-6.745zM16 8V5a2 2 0 00-2-2H10a2 2 0 00-2 2v3H4a2 2 0 00-2 2v3a2 2 0 002 2h16a2 2 0 002-2v-3a2 2 0 00-2-2h-4zM10 8V5h4v3h-4z" /></svg>
            <span class="text-[8px] font-bold uppercase">Services</span>
        </a>
        <a href="admin-transactions.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[8px] font-bold uppercase">Trx</span>
        </a>
        <a href="admin-agents.html" class="flex flex-col items-center gap-1 shrink-0 text-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span class="text-[8px] font-bold uppercase">Agents</span>
        </a>
        <a href="admin-users.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span class="text-[8px] font-bold uppercase">Users</span>
        </a>
        <a href="admin-settings.html" class="flex flex-col items-center gap-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            <span class="text-[8px] font-bold uppercase">Settings</span>
        </a>
    </nav>
</body>
</html>
