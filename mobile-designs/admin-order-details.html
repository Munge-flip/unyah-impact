<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Controls - Admin Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-6">

    <!-- Header -->
    <header class="p-4 flex items-center gap-4 sticky top-0 z-50 bg-[#1e1e1e]/90 backdrop-blur-md border-b border-white/10 text-white shadow-sm">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center">
            <a href="admin-orders.html" class="p-2 bg-white/10 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <h1 class="text-lg font-bold tracking-tight truncate">Order HP-992</h1>
    </header>

    <main class="p-6 space-y-6">
        <!-- Main Controls -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Management Actions</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Assign Piloting Agent</label>
                    <select class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Unassigned</option>
                        <option>Agent_Silver</option>
                        <option>Jane_Doe</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Order Status</label>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        <button class="px-4 py-2 bg-yellow-100 text-yellow-700 text-[10px] font-black rounded-full border border-yellow-200">PENDING</button>
                        <button class="px-4 py-2 bg-blue-50 text-blue-400 text-[10px] font-black rounded-full border border-blue-100">PROGRESS</button>
                        <button class="px-4 py-2 bg-green-50 text-green-400 text-[10px] font-black rounded-full border border-green-100">DONE</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Service Info -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Order Details</h3>
            <div class="space-y-3 text-sm">
                <div class="flex justify-between">
                    <span class="text-slate-400">Service:</span>
                    <span class="font-bold text-slate-800">100% Map Completion</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">Total Price:</span>
                    <span class="font-black text-blue-600">₱500.00</span>
                </div>
            </div>
        </div>

        <button class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-100 uppercase text-sm">
            Save Changes
        </button>
    </main>
</body>
</html>
