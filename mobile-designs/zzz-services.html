<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenless Zone Zero Services - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Syne', sans-serif; }
        .service-btn-active { border-color: #fbbf24 !important; background: #fffbeb !important; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-40">

    <!-- Top Banner & Back Button -->
    <div class="relative h-48 w-full">
        <img src="../public/img/zzz banner.png" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/40"></div>
        <a href="index.html" class="absolute top-4 left-4 p-2 bg-white/20 backdrop-blur-md rounded-full text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
    </div>

    <!-- Game Info Card -->
    <div class="px-6 -mt-10 relative z-10">
        <div class="bg-white rounded-3xl p-4 shadow-xl flex items-center gap-4 border border-yellow-50">
            <img src="../public/img/zzz icon.png" class="w-16 h-16 rounded-full border-4 border-white shadow-lg">
            <div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight uppercase italic">Zenless Zone Zero</h1>
                <p class="text-[10px] font-black uppercase text-yellow-500 tracking-widest">New Eridu Piloting</p>
            </div>
        </div>
    </div>

    <main class="p-6 space-y-10">
        
        <!-- Maintenance -->
        <section>
            <h2 class="text-lg font-black uppercase italic text-gray-700 mb-4 border-b-2 border-yellow-400 pb-1">Maintenance</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Daily</span>
                    <span class="font-black text-yellow-600">₱57</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Weekly</span>
                    <span class="font-black text-yellow-600">₱300</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Monthly</span>
                    <span class="font-black text-yellow-600">₱1300</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full Patch (6 weeks)</span>
                    <span class="font-black text-yellow-600">₱1700</span>
                </button>
            </div>
        </section>

        <!-- Regular Quests -->
        <section>
            <h2 class="text-lg font-black uppercase italic text-gray-700 mb-4 border-b-2 border-yellow-400 pb-1">Regular Quests</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Short quests</span>
                    <span class="font-black text-yellow-600">₱60</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Long quests</span>
                    <span class="font-black text-yellow-600">₱170</span>
                </button>
            </div>
        </section>

        <!-- Events -->
        <section>
            <h2 class="text-lg font-black uppercase italic text-gray-700 mb-4 border-b-2 border-yellow-400 pb-1">Events</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Light events untouched</span>
                    <span class="font-black text-yellow-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full event untouched</span>
                    <span class="font-black text-yellow-600">₱120</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Light events halfway</span>
                    <span class="font-black text-yellow-600">₱100</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full event halfway</span>
                    <span class="font-black text-yellow-600">₱200</span>
                </button>
            </div>
        </section>

        <!-- Endgame -->
        <section>
            <h2 class="text-lg font-black uppercase italic text-gray-700 mb-4 border-b-2 border-yellow-400 pb-1">Endgame</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Shiyu Defense</span>
                    <span class="font-black text-yellow-600">₱150</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Deadly Assault</span>
                    <span class="font-black text-yellow-600">₱150</span>
                </button>
            </div>
        </section>

        <!-- Hollow Zero -->
        <section>
            <h2 class="text-lg font-black uppercase italic text-gray-700 mb-4 border-b-2 border-yellow-400 pb-1">Hollow Zero</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button class="p-4 bg-white border-2 border-gray-100 rounded-2xl text-center active:service-btn-active shadow-sm transition-all">
                    <span class="text-sm font-bold text-gray-700">Lost Void</span>
                </button>
                <button class="p-4 bg-white border-2 border-gray-100 rounded-2xl text-center active:service-btn-active shadow-sm transition-all">
                    <span class="text-sm font-bold text-gray-700">Withered Domain</span>
                </button>
            </div>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">20 levels</span>
                    <span class="font-black text-yellow-600">₱200</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Full level</span>
                    <span class="font-black text-yellow-600">₱1000</span>
                </button>
            </div>
        </section>

        <!-- 100% Area Completion -->
        <section>
            <h2 class="text-lg font-black uppercase italic text-gray-700 mb-4 border-b-2 border-yellow-400 pb-1">100% Area Completion</h2>
            <div class="space-y-3">
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">1 Location</span>
                    <span class="font-black text-yellow-600">₱170</span>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white border-2 border-gray-100 rounded-2xl active:service-btn-active shadow-sm transition-all">
                    <span class="font-bold text-gray-600">Whole Location</span>
                    <span class="font-black text-yellow-600">₱500</span>
                </button>
            </div>
        </section>

        <!-- Payment Method -->
        <section class="space-y-8">
            <h2 class="text-xl font-black text-gray-800 mb-4 border-b-2 border-orange-400 pb-2 uppercase tracking-tighter italic">Payment Method</h2>
            
            <div class="space-y-2">
                <span class="bg-orange-400 text-white text-[10px] font-black px-4 py-1 rounded-t-xl uppercase tracking-widest ml-1">QR Payment</span>
                <div class="grid grid-cols-2 gap-3 bg-white p-4 rounded-b-2xl rounded-tr-2xl border-2 border-orange-50 shadow-md">
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-orange-400 active:bg-orange-50 transition-all">
                        <span class="font-bold text-gray-800">GCash</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Scan QR</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-orange-400 active:bg-orange-50 transition-all">
                        <span class="font-bold text-gray-800">PayPal</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Scan QR</span>
                    </button>
                </div>
            </div>

            <div class="space-y-2">
                <span class="bg-indigo-500 text-white text-[10px] font-black px-4 py-1 rounded-t-xl uppercase tracking-widest ml-1">E-Wallet</span>
                <div class="grid grid-cols-2 gap-3 bg-white p-4 rounded-b-2xl rounded-tr-2xl border-2 border-indigo-50 shadow-md">
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-indigo-400 active:bg-indigo-50 transition-all">
                        <span class="font-bold text-gray-800">GCash</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Direct</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 p-4 border-2 border-gray-50 rounded-2xl active:border-indigo-400 active:bg-indigo-50 transition-all">
                        <span class="font-bold text-gray-800">PayPal</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Direct</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Sticky Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-gray-100 p-6 rounded-t-[3rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] z-50">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] uppercase font-black text-gray-400 tracking-widest mb-1">Total Order</p>
                <p class="text-3xl font-black text-yellow-500 italic leading-none">₱0.00</p>
            </div>
            <button class="bg-yellow-400 text-black font-black py-4 px-10 rounded-2xl shadow-xl shadow-yellow-100 active:scale-95 transition-all uppercase text-sm italic tracking-tighter">
                Get Started
            </button>
        </div>
    </div>

</body>
</html>
